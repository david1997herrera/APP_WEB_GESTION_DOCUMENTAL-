{% extends "layouts/base.html" %}

{% block title %}Nueva Requisición de Compra{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">
                    <i class="fas fa-cart-plus me-2"></i>Nueva Requisición de Compra
                </h5>
            </div>
            <div class="card-body">
                <form method="POST" class="needs-validation" novalidate>
                    <div class="mb-3">
                        <label for="title" class="form-label">Título *</label>
                        <input type="text" class="form-control" id="title" name="title" required>
                        <div class="invalid-feedback">
                            Ingresa un título.
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Descripción</label>
                        <textarea class="form-control" id="description" name="description" rows="4"
                                  placeholder="Describe brevemente qué se requiere comprar y por qué"></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="amount" class="form-label">Monto estimado</label>
                                <div class="input-group">
                                    <span class="input-group-text">$</span>
                                    <input type="number" step="0.01" min="0" class="form-control" id="amount" name="amount"
                                           placeholder="0.00">
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="target_user_id" class="form-label">Dirigida a</label>
                                <select class="form-select" id="target_user_id" name="target_user_id">
                                    <option value="">Seleccionar usuario</option>
                                    {% for user in users %}
                                    <option value="{{ user.id }}">
                                        {{ user.username }} ({{ user.role.title() }})
                                    </option>
                                    {% endfor %}
                                </select>
                                <div class="form-text small">
                                    Usuario que recibirá la notificación y gestionará la requisición.
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mt-3">
                        <a href="{{ url_for('requisition.my') }}" class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-left me-1"></i>Cancelar
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-paper-plane me-1"></i>Enviar requisición
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
